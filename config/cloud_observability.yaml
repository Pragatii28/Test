# config/cloud_observability.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Multi-Cloud Observability Collector — configuration
# ─────────────────────────────────────────────────────────────────────────────

clouds:
  aws:
    enabled: true
    access_key_id: ""
    secret_access_key: ""
    regions:
      - us-east-1
      - eu-north-1
      - ap-south-1
      # - us-west-2
      # - eu-west-1
    resources:
      - ec2_instances
      - rds_instances
      - lambda_functions
      - dynamodb_tables
      - elb_load_balancers
    lookback_minutes: 10
    logs_lookback_minutes: 15
    max_log_groups: 20
    max_log_events_per_group: 50

  azure:
    enabled: false
    subscription_id: ""          # or set AZURE_SUBSCRIPTION_ID env var
    regions:
      - eastus
      - westeurope
    resources:
      - virtual_machines
      - function_apps
      - sql_databases
      - app_services
    lookback_minutes: 10
    logs_lookback_minutes: 15
    # log_analytics_workspace_id: ""   # required for log collection

  gcp:
    enabled: false
    project_id: ""               # or set GCP_PROJECT_ID env var
    regions:
      - us-central1
      - europe-west1
    resources:
      - gce_instances
      - cloud_functions
      - cloud_run_services
      - gke_clusters
    lookback_minutes: 10
    logs_lookback_minutes: 15
    max_log_entries: 200


# ─────────────────────────────────────────────────────────────────────────────
# Storage backend
# ─────────────────────────────────────────────────────────────────────────────
storage:

  # Options: sqlite | postgres | timescaledb
  backend: sqlite

  # ── SQLite (default, zero dependencies) ───────────────────────────────────
  sqlite:
    path: observability_data/metrics.db
    #path: observability_data/dummy_7day.db

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Uncomment to use PostgreSQL (pip install psycopg2-binary)
  # backend: postgres
  # postgres:
  #   host:     localhost
  #   port:     5432
  #   dbname:   observability
  #   user:     postgres
  #   password: secret
  #   # OR use a single DSN (overrides individual fields):
  #   # dsn: "postgresql://postgres:secret@localhost:5432/observability"

  # ── TimescaleDB ────────────────────────────────────────────────────────────
  # Same connection settings as postgres; hypertables are created automatically.
  # backend: timescaledb
  # postgres:
  #   host:     localhost
  #   port:     5432
  #   dbname:   observability
  #   user:     postgres
  #   password: secret

  # ── Prometheus exporter (always on by default) ────────────────────────────
  prometheus:
    enabled: true
    host: "0.0.0.0"
    port: 8000


# ─────────────────────────────────────────────────────────────────────────────
# Collection settings
# ─────────────────────────────────────────────────────────────────────────────
collection:
  parallel_clouds: true
  max_workers: 8

anomaly_detection:
  # RCA Configuration (Patch #1)
  rca_enabled: true
  rca_report_dir: "rca_reports/"
  rca_timeout_seconds: 30
  rca_max_anomalies_per_cycle: 5
  
  # Metric-specific minimums (Patch #6)
  # These override MIN_DATAPOINTS for specific metrics
  network_packets_in: 2
  network_packets_out: 2
  status_check_failed: 1
  
  # Dedup windows (Patch #7)
  dedup_windows:
    always_bad: 30          # minutes
    hard_limit: 30
    cpu_safety_net: 5
    prophet: 5
    isolation_forest: 5
    river: 5
    zscore: 5

  tuning:
    global_sensitivity: 3.0
    min_std_floor: 0.5
    algorithm_thresholds:
      prophet: 0.1
      isolation_forest: 0.005
      river: 0.75
    prophet_window_hours: 48
    isolation_forest_window_hours: 24
    prophet_max_age_hours: 1
    metric_overrides:
      network_in_bytes: 0.1
      network_out_bytes: 0.1
  
